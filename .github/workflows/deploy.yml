name: Deploy Backend to EC2

on:
  push:
    branches:
      - deploy
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag and push Docker image
        env:
          ECR_REGISTRY: ${{ secrets.ECR_REGISTRY }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t $ECR_REGISTRY:$IMAGE_TAG .
          docker push $ECR_REGISTRY:$IMAGE_TAG

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          timeout: 30m
          command_timeout: 30m
          script: |
            # Login a ECR
            aws ecr get-login-password --region ${{ secrets.AWS_REGION }} \
            | docker login --username AWS --password-stdin ${{ secrets.ECR_REGISTRY }}

            # Crear directorio aplicación
            mkdir -p /home/ubuntu/innovatech-backend

            # Entrar al directorio
            cd /home/ubuntu/innovatech-backend

            # Crear docker-compose.yml
            cat > docker-compose.yml << EOF
            version: '3.8'

            services:

              database:
                image: mysql:8.0
                container_name: innovatech-db
                restart: unless-stopped
                environment:
                  MYSQL_ROOT_PASSWORD: root123
                  MYSQL_DATABASE: innovatech_db
                  MYSQL_USER: backend
                  MYSQL_PASSWORD: password123
                volumes:
                  - mysql_data:/var/lib/mysql
                networks:
                  - app-network
                healthcheck:
                  test: ["CMD-SHELL", "mysqladmin ping -h localhost -uroot -proot123"]
                  interval: 10s
                  timeout: 5s
                  retries: 10

              backend:
                image: ${{ secrets.ECR_REGISTRY }}:${{ github.sha }}
                container_name: innovatech-backend
                restart: unless-stopped
                depends_on:
                  database:
                    condition: service_healthy
                ports:
                  - "8080:8080"
                  - "8081:8081"
                environment:
                  DB_ENDPOINT: database
                  DB_PORT: 3306
                  DB_NAME: innovatech_db
                  DB_USERNAME: backend
                  DB_PASSWORD: password123
                volumes:
                  - backend_data:/app/data
                networks:
                  - app-network

            volumes:
              mysql_data:
              backend_data:

            networks:
              app-network:
                driver: bridge
            EOF

            # Detener stack anterior
            sudo docker-compose down || true

            # Descargar nuevas imágenes
            sudo docker-compose pull

            # Levantar contenedores
            sudo docker-compose up -d

            # Mostrar estado
            sudo docker-compose ps

            # Limpiar imágenes dangling
            sudo docker image prune -f